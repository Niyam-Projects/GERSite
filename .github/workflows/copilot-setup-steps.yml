name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install GERSite dependencies
        run: uv sync --extra gers

      - name: Validate notebook structure (no MultipleDefinitionError)
        run: |
          uv run python -c "
          import sys, importlib.util

          errors = []
          for flow_file in [
              'flows/ingest_sources.py',
              'flows/generate_bridges.py',
              'flows/produce_gold_layer.py',
          ]:
              sys.argv = [flow_file, '--aoi', 'saipan']
              spec = importlib.util.spec_from_file_location('flow', flow_file)
              mod = importlib.util.module_from_spec(spec)
              spec.loader.exec_module(mod)
              try:
                  mod.app.run()
                  print(f'OK: {flow_file}')
              except Exception as e:
                  msg = str(e)
                  # ModuleNotFoundError / ImportError from missing optional deps is OK;
                  # structural Marimo errors (MultipleDefinitionError, etc.) are not.
                  if type(e).__name__ in ('MultipleDefinitionError', 'CycleError'):
                      errors.append(f'FAIL ({type(e).__name__}): {flow_file}: {msg}')
                  else:
                      print(f'OK (import-only env): {flow_file}')

          if errors:
              for err in errors:
                  print(err, file=sys.stderr)
              sys.exit(1)
          "

      - name: Validate lib module imports
        run: |
          uv run python -c "
          import sys
          sys.path.insert(0, 'lib')
          import duckdb_helpers
          import spatial_utils
          import scoring
          print('All lib modules import OK')
          "

      - name: Validate AOI GeoJSON files
        run: |
          uv run python -c "
          import json, pathlib
          for f in pathlib.Path('aoi').glob('*.geojson'):
              data = json.loads(f.read_text())
              assert data.get('type') == 'Feature', f'{f}: expected GeoJSON Feature'
              print(f'OK: {f.name}')
          "
